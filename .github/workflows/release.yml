name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "pnpm"
          cache-dependency-path: 'pnpm-lock.yaml'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm ci

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests with coverage check
        run: pnpm vitest run --coverage --coverage.threshold=80 --coverage.reporter=text-summary

      - name: Build packages
        run: pnpm build

      - name: Validate package publish
        run: |
          pnpm publish --dry-run --access public --no-git-checks
          pnpm --dir packages/skills publish --dry-run --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM
        run: |
          pnpm publish --access public --no-git-checks
          pnpm --dir packages/skills publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release notes
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
